<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satoshi API — Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px}
h1{color:#f7931a;margin-bottom:20px;font-size:1.5rem}
h2{color:#f7931a;margin:20px 0 10px;font-size:1.1rem}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;text-align:center}
.kpi .value{font-size:1.8rem;font-weight:700;color:#f7931a}
.kpi .label{font-size:0.8rem;color:#888;margin-top:4px}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px;margin-bottom:20px}
.chart-box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px}
canvas{max-height:300px}
table{width:100%;border-collapse:collapse;margin-top:8px}
th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #333}
th{color:#f7931a;font-size:0.8rem;text-transform:uppercase}
td{font-size:0.85rem}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:0.8rem;color:#666}
.status-bar .live{color:#4caf50}
.error-msg{color:#ff5252;text-align:center;padding:40px;font-size:1.1rem}
.tables{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:16px}
.table-box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;overflow-x:auto}
</style>
</head>
<body>
<h1>Satoshi API — Admin Dashboard</h1>
<div class="status-bar">
  <span>Last updated: <span id="last-updated">—</span></span>
  <span class="live" id="status-indicator">● Auto-refresh: 60s</span>
</div>

<div class="kpi-row">
  <div class="kpi"><div class="value" id="kpi-requests">—</div><div class="label">Requests (24h)</div></div>
  <div class="kpi"><div class="value" id="kpi-error-rate">—</div><div class="label">Error Rate (24h)</div></div>
  <div class="kpi"><div class="value" id="kpi-latency">—</div><div class="label">Avg Latency (ms)</div></div>
  <div class="kpi"><div class="value" id="kpi-keys">—</div><div class="label">Unique Keys (24h)</div></div>
  <div class="kpi"><div class="value" id="kpi-wow">—</div><div class="label">WoW Growth</div></div>
</div>

<div class="charts">
  <div class="chart-box">
    <h2>Requests Over Time</h2>
    <canvas id="requests-chart"></canvas>
  </div>
  <div class="chart-box">
    <h2>Top Endpoints</h2>
    <canvas id="endpoints-chart"></canvas>
  </div>
  <div class="chart-box">
    <h2>Latency Percentiles</h2>
    <canvas id="latency-chart"></canvas>
  </div>
</div>

<div class="tables">
  <div class="table-box">
    <h2>Per-Key Usage</h2>
    <table>
      <thead><tr><th>Key</th><th>Prefix</th><th>Hits</th><th>Avg ms</th><th>Err %</th><th>Last Seen</th></tr></thead>
      <tbody id="keys-table"></tbody>
    </table>
  </div>
  <div class="table-box">
    <h2>Retention</h2>
    <table>
      <thead><tr><th>Window</th><th>Active Keys</th><th>Total</th><th>Rate</th></tr></thead>
      <tbody id="retention-table"></tbody>
    </table>
  </div>
</div>

<div id="error-container"></div>

<script>
const params = new URLSearchParams(window.location.search);
const ADMIN_KEY = params.get('key') || '';
const BASE = window.location.origin + '/api/v1';

async function apiFetch(path) {
  const resp = await fetch(BASE + path, {headers: {'X-Admin-Key': ADMIN_KEY}});
  if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
  return resp.json();
}

let requestsChart, endpointsChart, latencyChart;

function initCharts() {
  const chartDefaults = {color: '#e0e0e0'};
  Chart.defaults.color = '#e0e0e0';
  Chart.defaults.borderColor = '#333';

  requestsChart = new Chart(document.getElementById('requests-chart'), {
    type: 'line',
    data: {labels: [], datasets: [{label: 'Requests', data: [], borderColor: '#f7931a', backgroundColor: 'rgba(247,147,26,0.1)', fill: true, tension: 0.3}]},
    options: {responsive: true, plugins: {legend: {display: false}}, scales: {x: {display: true}, y: {beginAtZero: true}}}
  });

  endpointsChart = new Chart(document.getElementById('endpoints-chart'), {
    type: 'bar',
    data: {labels: [], datasets: [{label: 'Hits', data: [], backgroundColor: '#f7931a'}]},
    options: {responsive: true, indexAxis: 'y', plugins: {legend: {display: false}}, scales: {x: {beginAtZero: true}}}
  });

  latencyChart = new Chart(document.getElementById('latency-chart'), {
    type: 'bar',
    data: {labels: ['p50', 'p95', 'p99'], datasets: [{label: 'ms', data: [0, 0, 0], backgroundColor: ['#4caf50', '#ff9800', '#ff5252']}]},
    options: {responsive: true, plugins: {legend: {display: false}}, scales: {y: {beginAtZero: true}}}
  });
}

async function refresh() {
  try {
    const [overview, requests, endpoints, latency, keys, growth, retention] = await Promise.all([
      apiFetch('/analytics/overview'),
      apiFetch('/analytics/requests?period=24h&interval=1h'),
      apiFetch('/analytics/endpoints?period=24h&limit=10'),
      apiFetch('/analytics/latency?period=24h'),
      apiFetch('/analytics/keys?period=24h&limit=20'),
      apiFetch('/analytics/growth'),
      apiFetch('/analytics/retention'),
    ]);

    // KPIs
    const ov = overview.data;
    document.getElementById('kpi-requests').textContent = ov.requests_24h.toLocaleString();
    document.getElementById('kpi-error-rate').textContent = (ov.error_rate_24h * 100).toFixed(2) + '%';
    document.getElementById('kpi-latency').textContent = ov.avg_latency_ms_24h != null ? ov.avg_latency_ms_24h.toFixed(1) : '—';
    document.getElementById('kpi-keys').textContent = ov.unique_keys_24h;

    const wow = growth.data.requests_wow_pct;
    document.getElementById('kpi-wow').textContent = wow != null ? (wow >= 0 ? '+' : '') + wow + '%' : '—';

    // Requests chart
    const rData = requests.data;
    requestsChart.data.labels = rData.map(r => new Date(r.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}));
    requestsChart.data.datasets[0].data = rData.map(r => r.count);
    requestsChart.update();

    // Endpoints chart
    const eData = endpoints.data.slice(0, 10);
    endpointsChart.data.labels = eData.map(e => e.endpoint.replace('/api/v1/', ''));
    endpointsChart.data.datasets[0].data = eData.map(e => e.hits);
    endpointsChart.update();

    // Latency chart
    const lData = latency.data;
    latencyChart.data.datasets[0].data = [lData.p50 || 0, lData.p95 || 0, lData.p99 || 0];
    latencyChart.update();

    // Keys table
    const keysBody = document.getElementById('keys-table');
    keysBody.innerHTML = keys.data.map(k => `<tr>
      <td><code>${k.key_hash_short}</code></td>
      <td>${k.prefix || '—'}</td>
      <td>${k.hits}</td>
      <td>${k.avg_latency_ms != null ? k.avg_latency_ms.toFixed(1) : '—'}</td>
      <td>${(k.error_rate * 100).toFixed(1)}%</td>
      <td>${k.last_seen || '—'}</td>
    </tr>`).join('');

    // Retention table
    const ret = retention.data;
    const retBody = document.getElementById('retention-table');
    retBody.innerHTML = [
      ['24h', ret.active_24h, ret.total_registered_keys, ret.retention_24h_pct + '%'],
      ['7d', ret.active_7d, ret.total_registered_keys, ret.retention_7d_pct + '%'],
      ['30d', ret.active_30d, ret.total_registered_keys, ret.retention_30d_pct + '%'],
    ].map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');

    document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
    document.getElementById('error-container').innerHTML = '';
  } catch (err) {
    document.getElementById('error-container').innerHTML = `<div class="error-msg">Failed to load: ${err.message}. Check admin key.</div>`;
  }
}

initCharts();
refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
