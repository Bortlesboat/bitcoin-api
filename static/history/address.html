<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Address Explorer — Bitcoin History — Satoshi API</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root { --bg: #0D1117; --surface: #161B22; --border: #21262D; --text: #E6EDF3; --muted: #8B949E; --dim: #6E7681; --accent: #F7931A; --accent-hover: #FFB347; --accent-muted: #F7931A33; --green: #3FB950; --error: #F85149; --warning: #D29922; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
a { color: var(--accent); text-decoration: none; } a:hover { color: var(--accent-hover); }
code { font-family: 'JetBrains Mono', monospace; background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }
nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
nav .logo { font-weight: 800; font-size: 0.85em; letter-spacing: 0.1em; text-transform: uppercase; } nav .logo a { color: var(--text); }
nav .links { display: flex; gap: 24px; font-size: 0.9em; } nav .links a { color: var(--muted); } nav .links a:hover, nav .links a.active { color: var(--text); }
.container { max-width: 960px; margin: 0 auto; padding: 24px; }
h1 { font-size: 1.8em; margin-bottom: 16px; } h1 span { color: var(--accent); }
.search-mode { text-align: center; padding: 80px 0; }
.search-mode input { width: 100%; max-width: 600px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1em; font-family: inherit; outline: none; }
.search-mode input:focus { border-color: var(--accent); }
.search-mode button { background: var(--accent); color: #000; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 12px; font-size: 1em; }
.search-mode p { color: var(--muted); margin-top: 8px; font-size: 0.9em; }
.addr-display { font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: var(--muted); word-break: break-all; margin-bottom: 16px; }
.type-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75em; font-weight: 600; text-transform: uppercase; background: var(--accent-muted); color: var(--accent); margin-left: 8px; }
.validation-info { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 16px 0; }
.validation-info .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9em; }
.validation-info .row .label { color: var(--muted); }
.api-key-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin: 24px 0; }
.api-key-section h3 { margin-bottom: 8px; font-size: 1em; }
.api-key-section p { color: var(--muted); font-size: 0.9em; margin-bottom: 12px; }
.api-key-section .input-row { display: flex; gap: 8px; }
.api-key-section input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85em; }
.api-key-section button { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 600; cursor: pointer; }
.utxo-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.9em; }
.utxo-table th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; }
.utxo-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.utxo-table .txid-cell { font-family: 'JetBrains Mono', monospace; font-size: 0.8em; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.utxo-table .check-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
.utxo-table .check-btn:hover { border-color: var(--accent); color: var(--accent); }
.mcp-section { border-left: 3px solid var(--accent); background: var(--surface); padding: 24px; border-radius: 0 8px 8px 0; margin: 32px 0; }
.mcp-section h3 { color: var(--accent); margin-bottom: 12px; }
.mcp-cmd { display: flex; justify-content: space-between; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; margin: 6px 0; font-family: 'JetBrains Mono', monospace; font-size: 0.8em; }
.mcp-cmd .cmd-text { word-break: break-all; margin-right: 8px; }
.mcp-cmd .copy-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8em; flex-shrink: 0; }
.mcp-cmd .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.status-msg { padding: 16px; border-radius: 8px; margin: 16px 0; font-size: 0.9em; }
.status-msg.error { background: #F8514922; border: 1px solid var(--error); color: var(--error); }
.status-msg.warning { background: #D2992222; border: 1px solid var(--warning); color: var(--warning); }
.status-msg.info { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
@media (max-width: 600px) { h1 { font-size: 1.3em; } nav .links { display: none; } .utxo-table { font-size: 0.8em; } }
</style>
</head>
<body>
<nav>
  <div class="logo"><a href="/"><img src="/logo-128.png" alt="" style="height:24px;vertical-align:middle;margin-right:8px;">SATOSHI API</a></div>
  <div class="links">
    <a href="/">Home</a>
    <a href="/history" class="active">History</a>
    <a href="/docs">API Docs</a>
    <a href="/visualizer">Visualizer</a>
    <a href="https://github.com/Bortlesboat/bitcoin-api" target="_blank" rel="noopener noreferrer">GitHub</a>
  </div>
</nav>
<div class="container">
  <div id="searchMode" class="search-mode">
    <h1>Address <span>Explorer</span></h1>
    <input type="text" id="addrSearchInput" placeholder="Enter a Bitcoin address (bc1..., 1..., 3...)">
    <br><button onclick="searchAddress()">Explore Address</button>
    <p>Validate any Bitcoin address for free. UTXO scanning requires an API key.</p>
  </div>
  <div id="addrContent" style="display:none;">
    <h1>Address <span>Details</span></h1>
    <div class="addr-display" id="addrDisplay"></div>
    <div id="validationInfo" class="validation-info"></div>
    <div id="statusMsg"></div>
    <div id="apiKeySection" class="api-key-section">
      <h3>Scan UTXOs</h3>
      <p>UTXO scanning requires an API key. <a href="/api/v1/register" target="_blank">Register for free</a> or enter your key below.</p>
      <div class="input-row">
        <input type="text" id="apiKeyInput" placeholder="Your API key">
        <button onclick="scanUtxos()">Scan UTXOs</button>
      </div>
    </div>
    <div id="utxoResults" style="display:none;"></div>
    <div class="mcp-section">
      <h3>MCP Command Builder</h3>
      <div id="mcpCommands"></div>
    </div>
  </div>
</div>
<script>
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function copyToClipboard(text, btn) { navigator.clipboard.writeText(text).then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }); }
function copyCmd(el) { const text = el.closest('.mcp-cmd').querySelector('.cmd-text').textContent; copyToClipboard(text, el); }

const params = new URLSearchParams(window.location.search);
let address = params.get('address');
const savedKey = localStorage.getItem('satoshi_api_key') || '';

function searchAddress() {
  const v = document.getElementById('addrSearchInput').value.trim();
  if (v) window.location.href = '/history/address?address=' + encodeURIComponent(v);
}
document.getElementById('addrSearchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') searchAddress(); });

async function init() {
  if (!address) return; // search mode
  document.getElementById('searchMode').style.display = 'none';
  document.getElementById('addrContent').style.display = 'block';
  document.getElementById('addrDisplay').textContent = address;
  document.title = 'Address ' + address.substring(0, 12) + '... — Bitcoin History — Satoshi API';

  if (savedKey) document.getElementById('apiKeyInput').value = savedKey;

  // Validate via RPC proxy (free, no key needed)
  try {
    const resp = await fetch('/api/v1/rpc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method: 'validateaddress', params: [address] })
    });
    const json = await resp.json();
    const result = json.data?.result || json.result || {};
    renderValidation(result);
  } catch (e) {
    document.getElementById('validationInfo').innerHTML = '<p style="color:var(--error);">Validation failed: ' + escapeHtml(e.message) + '</p>';
  }

  // Build MCP commands
  const cmds = [
    { label: 'Get UTXOs', cmd: 'get_address_utxos ' + address },
    { label: 'Validate', cmd: 'validate_address ' + address },
  ];
  document.getElementById('mcpCommands').innerHTML = cmds.map(c => '<div class="mcp-cmd"><span class="cmd-text">' + escapeHtml(c.cmd) + '</span><button class="copy-btn" onclick="copyCmd(this)">Copy</button></div>').join('');

  // Auto-scan if key stored
  if (savedKey) scanUtxos();
}

function renderValidation(result) {
  const isValid = result.isvalid;
  let html = '<div class="row"><div class="label">Valid</div><div>' + (isValid ? '<span style="color:var(--green);">Yes</span>' : '<span style="color:var(--error);">No</span>') + '</div></div>';
  if (result.address) html += '<div class="row"><div class="label">Address</div><div style="font-family:JetBrains Mono,monospace;font-size:0.85em;word-break:break-all;">' + escapeHtml(result.address) + '</div></div>';
  if (result.scriptPubKey) html += '<div class="row"><div class="label">Script</div><div style="font-family:JetBrains Mono,monospace;font-size:0.8em;word-break:break-all;">' + escapeHtml(result.scriptPubKey) + '</div></div>';
  if (result.isscript !== undefined) html += '<div class="row"><div class="label">Is Script</div><div>' + result.isscript + '</div></div>';
  if (result.iswitness !== undefined) html += '<div class="row"><div class="label">Is Witness</div><div>' + result.iswitness + '</div></div>';
  if (result.witness_version !== undefined) html += '<div class="row"><div class="label">Witness Version</div><div>' + result.witness_version + '</div></div>';
  if (result.witness_program) html += '<div class="row"><div class="label">Witness Program</div><div style="font-family:JetBrains Mono,monospace;font-size:0.8em;">' + escapeHtml(result.witness_program) + '</div></div>';

  // Address type badge
  let addrType = 'Unknown';
  if (address.startsWith('bc1q') && address.length === 42) addrType = 'P2WPKH (Native SegWit)';
  else if (address.startsWith('bc1q') && address.length === 62) addrType = 'P2WSH (Native SegWit Script)';
  else if (address.startsWith('bc1p')) addrType = 'P2TR (Taproot)';
  else if (address.startsWith('3')) addrType = 'P2SH (Script Hash)';
  else if (address.startsWith('1')) addrType = 'P2PKH (Legacy)';
  html = '<div class="row"><div class="label">Type</div><div><span class="type-badge" style="display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.75em;font-weight:600;background:var(--accent-muted);color:var(--accent);">' + escapeHtml(addrType) + '</span></div></div>' + html;

  document.getElementById('validationInfo').innerHTML = html;
}

async function scanUtxos() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) { showStatus('Please enter an API key.', 'warning'); return; }
  localStorage.setItem('satoshi_api_key', key);
  showStatus('Scanning UTXOs...', 'info');
  try {
    const resp = await fetch('/api/v1/address/' + encodeURIComponent(address) + '/utxos', {
      headers: { 'X-API-Key': key }
    });
    if (resp.status === 403) { showStatus('Invalid API key. Register at /api/v1/register', 'error'); return; }
    if (resp.status === 503) { showStatus('UTXO scanner is busy. Try again in a moment.', 'warning'); return; }
    if (resp.status === 504) { showStatus('Scan timed out. The address may have too many UTXOs.', 'warning'); return; }
    if (!resp.ok) { showStatus('Error: ' + resp.status, 'error'); return; }
    const json = await resp.json();
    const utxos = json.data || [];
    renderUtxos(utxos);
    showStatus('Found ' + utxos.length + ' UTXO(s)', 'info');
  } catch (e) {
    showStatus('Network error: ' + escapeHtml(e.message), 'error');
  }
}

function showStatus(msg, type) {
  document.getElementById('statusMsg').innerHTML = '<div class="status-msg ' + type + '">' + msg + '</div>';
}

function renderUtxos(utxos) {
  const div = document.getElementById('utxoResults');
  div.style.display = 'block';
  if (utxos.length === 0) { div.innerHTML = '<p style="color:var(--muted);padding:16px;">No UTXOs found for this address.</p>'; return; }
  let html = '<table class="utxo-table"><thead><tr><th>TXID</th><th>Vout</th><th>Value (BTC)</th><th>Height</th><th></th></tr></thead><tbody>';
  utxos.forEach(u => {
    const txid = u.txid || '';
    const shortTx = txid.substring(0, 16) + '...';
    html += '<tr><td class="txid-cell"><a href="/history/tx?txid=' + escapeHtml(txid) + '">' + escapeHtml(shortTx) + '</a></td><td>' + (u.vout !== undefined ? u.vout : '—') + '</td><td>' + (u.value_btc !== undefined ? u.value_btc : u.value !== undefined ? (u.value / 100000000).toFixed(8) : '—') + '</td><td>' + (u.height || '—') + '</td><td><button class="check-btn" onclick="checkSpend(\'' + escapeHtml(txid) + '\',' + (u.vout || 0) + ',this)">Check</button></td></tr>';
  });
  html += '</tbody></table>';
  div.innerHTML = html;

  // Update MCP commands with per-UTXO check_utxo
  const cmds = [
    { cmd: 'get_address_utxos ' + address },
    { cmd: 'validate_address ' + address },
  ];
  utxos.slice(0, 5).forEach(u => {
    cmds.push({ cmd: 'check_utxo ' + (u.txid || '') + ' ' + (u.vout || 0) });
    cmds.push({ cmd: 'analyze_transaction ' + (u.txid || '') });
  });
  document.getElementById('mcpCommands').innerHTML = cmds.map(c => '<div class="mcp-cmd"><span class="cmd-text">' + escapeHtml(c.cmd) + '</span><button class="copy-btn" onclick="copyCmd(this)">Copy</button></div>').join('');
}

function checkSpend(txid, vout, btn) {
  btn.textContent = '...';
  fetch('/api/v1/utxo/' + encodeURIComponent(txid) + '/' + vout)
    .then(r => r.json())
    .then(j => {
      const d = j.data || j;
      btn.textContent = d.spent ? 'Spent' : 'Unspent';
      btn.style.color = d.spent ? 'var(--error)' : 'var(--green)';
    })
    .catch(() => { btn.textContent = 'Error'; });
}

init();
</script>
</body>
</html>
