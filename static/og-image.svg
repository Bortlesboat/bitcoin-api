<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0d1117"/>
  <rect x="0" y="0" width="1200" height="4" fill="#f7931a"/>
  <!-- Bitcoin symbol -->
  <text x="600" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#f7931a" text-anchor="middle">&#x20bf;</text>
  <!-- Title -->
  <text x="600" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#e6edf3" text-anchor="middle">Satoshi API</text>
  <!-- Subtitle -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8b949e" text-anchor="middle">REST API for your Bitcoin node</text>
  <!-- Stats bar -->
  <rect x="200" y="420" width="800" height="1" fill="#30363d"/>
  <text x="320" y="480" font-family="monospace" font-size="22" fill="#3fb950" text-anchor="middle">76 endpoints</text>
  <text x="600" y="480" font-family="monospace" font-size="22" fill="#3fb950" text-anchor="middle">pip install satoshi-api</text>
  <text x="880" y="480" font-family="monospace" font-size="22" fill="#3fb950" text-anchor="middle">open source</text>
  <!-- URL -->
  <text x="600" y="560" font-family="monospace" font-size="20" fill="#58a6ff" text-anchor="middle">bitcoinsapi.com</text>
</svg>
