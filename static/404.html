:root {
  --bg: #0D1117;
  --surface: #161B22;
  --border: #21262D;
  --border-visible: #30363d;
  --text: #E6EDF3;
  --muted: #8B949E;
  --accent: #F7931A;
  --accent-hover: #FFB347;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; min-height: 100vh; display: flex; flex-direction: column; }
a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
a:hover { color: var(--accent-hover); }

/* Nav */
nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg); }
nav .logo { font-weight: 800; font-size: 0.85em; color: var(--text); letter-spacing: 0.1em; text-transform: uppercase; }
nav .links { display: flex; gap: 24px; font-size: 0.9em; align-items: center; }
nav .links a { color: var(--muted); transition: color 0.15s; }
nav .links a:hover { color: var(--text); }

/* Content */
.content { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
.error-code { font-size: 8em; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 16px; letter-spacing: -0.04em; }
.error-message { font-size: 1.4em; color: var(--muted); margin-bottom: 32px; }
.helpful-links { margin-bottom: 8px; color: var(--muted); font-size: 0.95em; }
.link-list { list-style: none; display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin-top: 12px; }
.link-list a { display: inline-block; padding: 10px 20px; border: 1px solid var(--border-visible); border-radius: 8px; color: var(--text); font-weight: 600; font-size: 0.9em; transition: all 0.15s; }
.link-list a:hover { border-color: var(--accent); color: var(--accent); }

/* Footer */
footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; color: var(--muted); font-size: 0.85em; }
footer a { color: var(--muted); }
footer a:hover { color: var(--text); }
</style>
