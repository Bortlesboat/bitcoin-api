# Bitcoin Core configuration for Satoshi API
# Copy relevant settings to your bitcoin.conf

server=1
txindex=1

# Dedicated RPC user with restricted command whitelist
rpcuser=satoshiapi
rpcpassword=CHANGE_ME_TO_A_STRONG_PASSWORD

# Only allow these RPC commands (principle of least privilege)
rpcwhitelist=satoshiapi:getblockchaininfo,getblockcount,getnetworkinfo,getmempoolinfo,estimatesmartfee,getmininginfo,getrawtransaction,gettxout,getmempoolentry,getrawmempool,getblockstats,getchaintips,decoderawtransaction,sendrawtransaction,getblocktemplate,getblockhash,getblock,getblockheader,validateaddress

# Only listen on localhost (CRITICAL for security)
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
